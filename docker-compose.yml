version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wedding_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: wedding_vendor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wedding_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wedding_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wedding_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=wedding_vendor_db
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wedding_network
    restart: unless-stopped

  # User Website (Next.js)
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: wedding_website
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
      - API_URL=http://backend:8080/api/v1
    depends_on:
      - backend
    networks:
      - wedding_network
    restart: unless-stopped

  # Admin Panel (Next.js)
  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: wedding_admin
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
      - API_URL=http://backend:8080/api/v1
    depends_on:
      - backend
    networks:
      - wedding_network
    restart: unless-stopped

  # Vendor Portal (Next.js)
  vendor:
    build:
      context: ./vendor-portal
      dockerfile: Dockerfile
    container_name: wedding_vendor_portal
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
      - API_URL=http://backend:8080/api/v1
    depends_on:
      - backend
    networks:
      - wedding_network
    restart: unless-stopped

  # Nginx Reverse Proxy - ONE PORT FOR EVERYTHING
  nginx:
    image: nginx:alpine
    container_name: wedding_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - website
      - admin
      - vendor
    networks:
      - wedding_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wedding_network:
    driver: bridge
