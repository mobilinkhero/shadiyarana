version: '3.8'

services:
  # Next.js Web App (connects directly to database)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: shadiyarana_web
    ports:
      - "80:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

# No separate backend needed - Next.js API routes handle everything
# No nginx needed - Next.js serves everything on port 80
