version: '3.8'

services:
  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadiyarana_backend
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - shadiyarana_network
    restart: unless-stopped

  # Next.js Frontend (User + Admin + Vendor)
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: shadiyarana_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
    depends_on:
      - backend
    networks:
      - shadiyarana_network
    restart: unless-stopped

  # Nginx Reverse Proxy - ONE DOMAIN FOR EVERYTHING
  nginx:
    image: nginx:alpine
    container_name: shadiyarana_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - shadiyarana_network
    restart: unless-stopped

networks:
  shadiyarana_network:
    driver: bridge
