events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8080;
    }

    upstream website {
        server website:3000;
    }

    upstream admin {
        server admin:3000;
    }

    upstream vendor {
        server vendor:3000;
    }

    # Main server - Port 80 for everything
    server {
        listen 80;
        server_name _;

        # Main Website - Root path
        location / {
            proxy_pass http://website;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Admin Panel - /admin path
        location /admin {
            rewrite ^/admin/(.*) /$1 break;
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Vendor Portal - /vendor path
        location /vendor {
            rewrite ^/vendor/(.*) /$1 break;
            proxy_pass http://vendor;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API - /api path
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
